---
### Caddy-specific settings
#
# Shared reverse-proxy settings (SSL on/off, email, allowlist, log
# level, external hosts list, etc.) live in defaults/main/reverse_proxy.yml.
# Only Caddy-specific knobs remain in this file.

# Caddy version to build against. Plain version string — the Dockerfile
# combines it with the variant suffix (-builder for the build stage,
# -alpine for the runtime stage). Track caddyserver/caddy releases;
# latest stable as of writing is 2.11.
hmsdocker_caddy_version: "2.11"

# The Caddy DNS provider module name to compile in. This is the suffix
# of the github.com/caddy-dns/<name> module — Caddy's xcaddy ecosystem
# uses different naming than Traefik's lego, so the variable is
# separate from traefik_ssl_dns_provider_code.
# Common values: cloudflare, route53, digitalocean, duckdns, gandi,
# googleclouddns, hetzner, namecheap, porkbun.
caddy_ssl_dns_provider_module: ""

# The Caddyfile directive name used to invoke the provider. For most
# providers this matches the module suffix above (e.g. "cloudflare").
# A few providers use a different directive name — check the module's
# README. Leave at default to inherit from caddy_ssl_dns_provider_module.
caddy_ssl_dns_provider_directive: "{{ caddy_ssl_dns_provider_module }}"

# Arguments appended after the `dns <directive>` line in the Caddyfile.
# Each caddy-dns/<provider> module has its own arg syntax — check the
# module's README. Use Caddy's {env.NAME} placeholder to reference
# credentials that hmsdocker_proxy_ssl_dns_provider_environment_vars
# above injected into the container's environment.
#
# Examples:
#   cloudflare:    "{env.CF_API_TOKEN}"
#   digitalocean:  "{env.DO_AUTH_TOKEN}"
#   duckdns:       "{env.DUCKDNS_TOKEN}"
#   route53:       ""      # the route53 module reads AWS_ACCESS_KEY_ID /
#                          # AWS_SECRET_ACCESS_KEY from the environment on
#                          # its own; no inline args needed.
#   gandi:         "{env.GANDI_BEARER_TOKEN}"
#   hetzner:       "{env.HETZNER_API_TOKEN}"
#   porkbun:       "api_key {env.PORKBUN_API_KEY} api_secret_key {env.PORKBUN_SECRET_KEY}"
caddy_ssl_dns_provider_args: ""
