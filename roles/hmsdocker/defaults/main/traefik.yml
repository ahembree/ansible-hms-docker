### Traefik-specific settings
#
# Shared reverse-proxy settings (SSL on/off, email, allowlist, log
# level, external hosts list, etc.) live in defaults/main/reverse_proxy.yml.
# Only Traefik-specific knobs remain in this file.

hmsdocker_traefik_version: latest

# Additional Traefik security hardening:
# * Minimum TLS 1.2 on https entrypoint
# * Disable the dashboard's insecure mode (port 8080 host binding)
# * Use the `secured` middleware chain (adds HSTS + Content-Type-Nosniff
#   + frameDeny headers) instead of bare `ipallowlist`
traefik_security_hardening: no   # default: no

# SANs (Subject Alternative Names) to also provision certificates for.
# Defaults to a wildcard for the configured domain. Add extra entries
# like '*.public' to cover other subdomains.
# Caddy doesn't use this — it auto-provisions a cert per site name.
traefik_ssl_sans: [
  '*.{{ hms_docker_domain }}',
]

# Traefik's lego DNS provider code (https://go-acme.github.io/lego/dns/).
# Common values: cloudflare, route53, digitalocean, gandi, googlecloud.
# Caddy uses a separate variable (caddy_ssl_dns_provider_module) because
# Caddy's module names don't always match lego's provider codes.
traefik_ssl_dns_provider_code: ""

# The DNS zone Traefik registers the wildcard cert against. Defaults to
# the configured hms_docker_domain.
traefik_ssl_dns_provider_zone: "{{ hms_docker_domain }}"

# Where Traefik watches for static file-provider configs (middlewares
# and external host routes). Only used by the Traefik backend.
#
# Deprecation notice:
# `traefik_ext_hosts_configs_path` was renamed to
# `hmsdocker_traefik_static_config_location` on 5/31/2024. The old name
# is still aliased through migrations/variable_renames.yml; it will be
# removed in a future release.
hmsdocker_traefik_static_config_location: "{{ traefik_ext_hosts_configs_path | default(hms_docker_apps_path + '/traefik/config/static_confs/') }}"
