---
# Role-internal port / scheme map per service. Drives the per-service
# Caddyfile fragments rendered into ${HMSD_APPS_PATH}/caddy/config/conf.d/
# when hmsdocker_reverse_proxy: caddy.
#
# Not user-facing — users should not edit this. To add a new service to
# the role, add the matching `proxy_labels(name=..., port=...)` call in
# the service's compose template AND a matching entry here. The
# preflight will hard-fail if a service is reverse-proxy-enabled but
# missing a port here.
#
# Keys:
#   name:    service key (matches hms_docker_container_map and the
#            container name on proxy_net)
#   port:    upstream port the container listens on
#   scheme:  optional; 'https' for upstreams with their own TLS
#            (self-signed). Defaults to 'http'.

hmsdocker_proxy_service_data:
  - { name: authentik,         port: 9443,  scheme: https, label_name: authentik-server }
  - { name: autobrr,           port: 7474 }
  - { name: backrest,          port: 9898 }
  - { name: bazarr,            port: 6767 }
  - { name: beszel,            port: 8090 }
  - { name: calibre,           port: 8181, scheme: https }
  - { name: checkrr,           port: 8585 }
  - { name: cleanuparr,        port: 11011 }
  - { name: deluge,            port: 8112 }
  - { name: dispatcharr,       port: 9191 }
  - { name: dockhand,          port: 3000 }
  - { name: emby,              port: 8096 }
  - { name: fileflows,         port: 5000 }
  - { name: heimdall,          port: 443,   scheme: https }
  - { name: homepage,          port: 3000 }
